name: level_up_coach
description: "Level Up Coaches App."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.6.5
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.3.0
  go_router: ^14.8.1
  level_up_shared:
    path: ../level_up_shared
  rxdart: ^0.28.0
  timeago: ^3.7.0
  file_picker: ^10.1.2
  firebase_storage: ^12.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/google_icon.png
  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/icons.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/icons/android_icon.png"
  image_path_ios: "assets/icons/ios_icon.png"  
